databases:
  - name: clinic-postgres
    databaseName: clinic_db
    plan: free

services:
  - type: web
    name: clinic-backend
    env: python
    rootDir: clinic_ops
    buildCommand: "./build.sh"
    startCommand: "gunicorn clinic_ops.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: clinic-postgres
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: DEBUG
        value: "False"

  - type: web
    name: clinic-frontend
    env: static
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: "./dist"
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: clinic-backend
          property: host
          format: https://{host}/api/
      - key: NODE_VERSION
        value: "20"
